<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .custom-layout .video-container {
            padding: 5px;
        }

        .custom-layout .image-container {
            padding: 5px;
        }

        .custom-layout img,
        .custom-layout video {
            width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            .custom-layout .row>div {
                flex: 0 0 100%;
                max-width: 100%;
            }

            .custom-layout .image-container {
                margin-bottom: 1px;
            }
        }
    </style>
</head>

<body>
    <div class="custom-layout">
        <!-- First Row -->
        <div class="row">
            <div class="col-md-8 video-container">
                <video autoplay loop muted playsinline>
                    <source src="https://cdn.shopify.com/videos/c/o/v/177c901e6ff943d1901218ef005694f0.mov"
                        type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="col-md-4">
                <div class="row">
                    <div class="col-12 image-container">
                        <img src="https://cdn.shopify.com/s/files/1/0615/8322/9043/files/a1.png?v=1775207495"
                            class="img-fluid">
                    </div>
                    <!-- <div class="col-12 image-container">
                        <img src="https://cdn.shopify.com/s/files/1/0615/8322/9043/files/3_f65e9e7a-423a-4fbb-ab00-ceefcac15058.png?v=1769682232"
                            class="img-fluid">
                    </div> -->
                </div>
            </div>
        </div>

        <!-- Second Row -->
        <div class="row">
            <div class="col-md-4 image-container">
                <img src="https://cdn.shopify.com/s/files/1/0615/8322/9043/files/a2.png?v=1775207697"
                    alt="Image 3" class="img-fluid">
            </div>
            <div class="col-md-8 video-container">
                <video autoplay loop muted playsinline>
                    <source src="https://cdn.shopify.com/videos/c/o/v/f984ac7219564e7980ae52e55c10aefc.mp4"
                        type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
    </div>
</body>

</html>
